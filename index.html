<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bill Summarizer (PDF Enabled)</title>
    <!-- Load PDF.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { font-family: system-ui, -apple-system, sans-serif; line-height: 1.5; background: #f4f4f9; color: #333; }
        body { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; font-weight: bold; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #0056b3; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; cursor: pointer; font-size: 1rem; width: 100%; }
        button:hover { background: #004494; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: white; }
        th, td { padding: 1rem; border: 1px solid #ddd; text-align: left; vertical-align: top; }
        th { background: #f8f9fa; }
        .status { color: #666; font-style: italic; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Legislative Impact Summarizer</h1>
    
    <div class="card">
        <div class="input-group">
            <label>LegiScan API Key:</label>
            <input type="password" id="legiscanKey">
        </div>
        <div class="input-group">
            <label>Gemini AI Key:</label>
            <input type="password" id="geminiKey">
        </div>
        <div class="input-group">
            <label>Search Query:</label>
            <input type="text" id="searchQuery" value="artificial intelligence">
        </div>
        <button id="searchBtn" onclick="runPipeline()">Fetch & Summarize</button>
        <div id="statusMsg" class="status"></div>
    </div>

    <table id="resultsTable" style="display: none;">
        <thead>
            <tr>
                <th>Bill</th>
                <th>AI Impact Summary</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        // Configure PDF.js Worker
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const CORS_PROXY = "https://corsproxy.io/?";

        async function runPipeline() {
            const legiscanKey = document.getElementById('legiscanKey').value;
            const geminiKey = document.getElementById('geminiKey').value;
            const query = document.getElementById('searchQuery').value;
            const tableBody = document.getElementById('tableBody');
            
            tableBody.innerHTML = "";
            document.getElementById('resultsTable').style.display = "table";

            try {
                // 1. Search LegiScan
                const searchRes = await fetch(`${CORS_PROXY}${encodeURIComponent(`https://api.legiscan.com/?key=${legiscanKey}&op=getSearch&year=2026&query=${query}`)}`);
                const searchData = await searchRes.json();
                const bills = Object.values(searchData.searchresult).filter(b => b.bill_id).slice(0, 5);

                for (let bill of bills) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td><b>${bill.state} ${bill.bill_number}</b></td><td id="summary-${bill.bill_id}">Loading...</td>`;
                    tableBody.appendChild(tr);

                    // 2. Fetch Text (HTML or PDF)
                    let text = await getBillText(legiscanKey, bill.bill_id);
                    
                    if (!text) {
                        document.getElementById(`summary-${bill.bill_id}`).innerText = "Error: Could not extract text.";
                        continue;
                    }

                    // 3. Summarize
                    let summary = await summarizeWithGemini(geminiKey, text, bill.title);
                    document.getElementById(`summary-${bill.bill_id}`).innerText = summary;
                }
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        async function getBillText(apiKey, billId) {
            const url = `${CORS_PROXY}${encodeURIComponent(`https://api.legiscan.com/?key=${apiKey}&op=getBillText&id=${billId}`)}`;
            const res = await fetch(url);
            const data = await res.json();
            
            if (data.status !== "OK") return null;

            const base64 = data.text.doc;
            const mime = data.text.mime;

            if (mime === "text/html") {
                const html = atob(base64);
                return html.replace(/<[^>]*>?/gm, ' ').replace(/\s+/g, ' ').trim();
            } 
            
            if (mime === "application/pdf") {
                return await extractTextFromPDF(base64);
            }
            
            return null;
        }

        async function extractTextFromPDF(base64) {
            const binary = atob(base64);
            const len = binary.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);

            const loadingTask = pdfjsLib.getDocument({data: bytes});
            const pdf = await loadingTask.promise;
            let fullText = "";

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const strings = content.items.map(item => item.str);
                fullText += strings.join(" ") + "\n";
            }
            return fullText;
        }

        async function summarizeWithGemini(apiKey, text, title) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            const prompt = `Summarize the impact of this bill in 1-10 sentences: ${title}\n\nText: ${text.substring(0, 50000)}`;
            
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }
    </script>
</body>
</html>
